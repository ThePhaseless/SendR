<div class="auth-page">
  <div class="card auth-card">
    <h1>Sign In</h1>
    <p class="auth-subtitle">Get a verification code sent to your email</p>

    @if (error(); as err) {
      <div class="alert alert-error">{{ err }}</div>
    }

    @if (step() === "email") {
      <form (ngSubmit)="requestCode()">
        <div class="form-group">
          <label for="email">Email address</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="you@example.com"
            required
            class="form-input"
          />
        </div>
        <button type="submit" class="btn btn-primary btn-full" [disabled]="loading() || !email">
          {{ loading() ? "Sending..." : "Send Code" }}
        </button>
      </form>
    } @else {
      @if (message(); as msg) {
        <div class="alert alert-success">{{ msg }}</div>
      }
      <form (ngSubmit)="verifyCode()">
        <div class="form-group">
          <label for="code">Verification code</label>
          <input
            id="code"
            type="text"
            [(ngModel)]="code"
            name="code"
            placeholder="Enter 6-digit code"
            required
            class="form-input"
          />
        </div>
        <button type="submit" class="btn btn-primary btn-full" [disabled]="loading() || !code">
          {{ loading() ? "Verifying..." : "Verify" }}
        </button>
        <button type="button" class="btn btn-secondary btn-full back-btn" (click)="backToEmail()">
          Back
        </button>
      </form>
    }
  </div>
</div>
