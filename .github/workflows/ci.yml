name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openapi-generated-check:
    name: "Generated API: Up to Date"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0

      - uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --no-dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Regenerate OpenAPI artifacts
        run: bash ./scripts/generate-openapi-client.sh

      - name: Fail if generated files are stale
        run: |
          if [ -n "$(git status --porcelain -- openapi.json frontend/src/app/api)" ]; then
            echo "Generated OpenAPI files are stale. Run 'bash ./scripts/generate-openapi-client.sh' and commit the results." >&2
            git diff --cached -- openapi.json frontend/src/app/api
            exit 1
          fi

  frontend-build:
    name: "Frontend: Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: frontend
        run: bun run build --configuration production

  frontend-lint:
    name: "Frontend: Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: bun run lint

  frontend-format:
    name: "Frontend: Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Check formatting
        working-directory: frontend
        run: bun run format:check

  # frontend-test:
  #   name: "Frontend: Test"
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6

  #     - uses: oven-sh/setup-bun@v2

  #     - name: Cache bun dependencies
  #       uses: actions/cache@v5
  #       with:
  #         path: ~/.bun/install/cache
  #         key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
  #         restore-keys: |
  #           ${{ runner.os }}-bun-

  #     - name: Install dependencies
  #       working-directory: frontend
  #       run: bun install --frozen-lockfile

  #     - name: Test
  #       working-directory: frontend
  #       run: bun run test --no-watch --browsers=ChromeHeadless

  backend-lint:
    name: "Backend: Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        working-directory: backend
        run: uv sync --no-install-project

      - name: Lint
        working-directory: backend
        run: uv run --no-project ruff check

  backend-format:
    name: "Backend: Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        working-directory: backend
        run: uv sync --no-install-project

      - name: Check formatting
        working-directory: backend
        run: uv run --no-project ruff format --check

  backend-test:
    name: "Backend: Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        working-directory: backend
        run: uv sync --no-install-project

      - name: Test
        working-directory: backend
        run: uv run --no-project pytest
