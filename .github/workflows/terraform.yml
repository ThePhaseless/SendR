name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'

env:
  TF_VERSION: '1.11.0'
  AWS_REGION: 'us-east-1'

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: Configure AWS Credentials for DO Spaces
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set AWS_PROFILE
        run: echo "AWS_PROFILE=digitalocean" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -upgrade

      - name: Terraform Format
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

  terraform-dev:
    runs-on: ubuntu-latest
    needs: terraform
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set AWS_PROFILE
        run: echo "AWS_PROFILE=digitalocean" >> $GITHUB_ENV

      - name: Terraform Init Dev
        working-directory: terraform
        run: |
          terraform init -upgrade -var-file="environments/dev.tfvars"
          terraform workspace select dev || terraform workspace new dev

      - name: Terraform Plan Dev
        if: github.event_name == 'pull_request'
        working-directory: terraform
        run: terraform plan -no-color -var-file="environments/dev.tfvars"
        env:
          TF_VAR_do_token: ${{ secrets.DEV_DO_TOKEN }}

      - name: Terraform Apply Dev
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: terraform
        run: terraform apply -auto-approve -var-file="environments/dev.tfvars"
        env:
          TF_VAR_do_token: ${{ secrets.DEV_DO_TOKEN }}

  terraform-staging:
    runs-on: ubuntu-latest
    needs: terraform-dev
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set AWS_PROFILE
        run: echo "AWS_PROFILE=digitalocean" >> $GITHUB_ENV

      - name: Terraform Init Staging
        working-directory: terraform
        run: |
          terraform init -upgrade -var-file="environments/staging.tfvars"
          terraform workspace select staging || terraform workspace new staging

      - name: Terraform Plan Staging
        if: github.event_name == 'pull_request'
        working-directory: terraform
        run: terraform plan -no-color -var-file="environments/staging.tfvars"
        env:
          TF_VAR_do_token: ${{ secrets.STAGING_DO_TOKEN }}

      - name: Terraform Apply Staging
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: terraform
        run: terraform apply -auto-approve -var-file="environments/staging.tfvars"
        env:
          TF_VAR_do_token: ${{ secrets.STAGING_DO_TOKEN }}

  terraform-prod:
    runs-on: ubuntu-latest
    needs: terraform-staging
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set AWS_PROFILE
        run: echo "AWS_PROFILE=digitalocean" >> $GITHUB_ENV

      - name: Terraform Init Prod
        working-directory: terraform
        run: |
          terraform init -upgrade -var-file="environments/prod.tfvars"
          terraform workspace select prod || terraform workspace new prod

      - name: Terraform Plan Prod
        if: github.event_name == 'pull_request'
        working-directory: terraform
        run: terraform plan -no-color -var-file="environments/prod.tfvars"
        env:
          TF_VAR_do_token: ${{ secrets.PROD_DO_TOKEN }}

      - name: Terraform Apply Prod
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: terraform
        run: terraform apply -auto-approve -var-file="environments/prod.tfvars"
        env:
          TF_VAR_do_token: ${{ secrets.PROD_DO_TOKEN }}