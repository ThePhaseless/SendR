name: Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["Build and Push Backend to GHCR", "Build and Push Frontend to GHCR"]
    types: [completed]
    branches: [main,DO-implementation]

env:
  KUBECTL_VERSION: '1.30.0'

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      ENVIRONMENT: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Configure kubectl
        shell: bash
        run: |
          echo "${{ secrets.DEV_KUBECONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

      - name: Deploy traefik
        run: |
          kubectl apply -k k8s/base/traefik/ --server-side

      - name: Deploy to dev
        run: |
          kubectl apply -k k8s/overlays/dev --server-side

      - name: Generate GitHub App Installation Token
        id: generate-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Create Kubernetes secrets
        env:
          SENDR_DATABASE_URL: ${{ secrets.DEV_SENDR_DATABASE_URL }}
          SENDR_SECRET_KEY: ${{ secrets.DEV_SENDR_SECRET_KEY }}
          SENDR_SMTP_HOST: ${{ secrets.SENDR_SMTP_HOST }}
          SENDR_SMTP_PORT: ${{ secrets.SENDR_SMTP_PORT }}
          SENDR_SMTP_USER: ${{ secrets.SENDR_SMTP_USER }}
          SENDR_SMTP_PASSWORD: ${{ secrets.SENDR_SMTP_PASSWORD }}
          SENDR_RESEND_API_KEY: ${{ secrets.SENDR_RESEND_API_KEY }}
          GITHUB_APP_TOKEN: ${{ steps.generate-token.outputs.token }}
          SENDR_GITHUB_EMAIL: ${{ vars.SENDR_GITHUB_EMAIL }}
        run: ./scripts/create-secrets.sh ${{ env.ENVIRONMENT }}

  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    needs: deploy-dev
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      ENVIRONMENT: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Configure kubectl
        shell: bash
        run: |
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

      - name: Deploy traefik
        run: |
          kubectl apply -k k8s/base/traefik/ --server-side

      - name: Deploy to staging
        run: |
          kubectl apply -k k8s/overlays/staging --server-side

      - name: Generate GitHub App Installation Token
        id: generate-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Create Kubernetes secrets
        env:
          SENDR_DATABASE_URL: ${{ secrets.STAGING_SENDR_DATABASE_URL }}
          SENDR_SECRET_KEY: ${{ secrets.STAGING_SENDR_SECRET_KEY }}
          SENDR_SMTP_HOST: ${{ secrets.SENDR_SMTP_HOST }}
          SENDR_SMTP_PORT: ${{ secrets.SENDR_SMTP_PORT }}
          SENDR_SMTP_USER: ${{ secrets.SENDR_SMTP_USER }}
          SENDR_SMTP_PASSWORD: ${{ secrets.SENDR_SMTP_PASSWORD }}
          SENDR_RESEND_API_KEY: ${{ secrets.SENDR_RESEND_API_KEY }}
          GITHUB_APP_TOKEN: ${{ steps.generate-token.outputs.token }}
          SENDR_GITHUB_EMAIL: ${{ vars.SENDR_GITHUB_EMAIL }}
        run: ./scripts/create-secrets.sh ${{ env.ENVIRONMENT }}

  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-staging
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      ENVIRONMENT: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Configure kubectl
        shell: bash
        run: |
          echo "${{ secrets.PROD_KUBECONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

      - name: Deploy traefik
        run: |
          kubectl apply -k k8s/base/traefik/ --server-side

      - name: Deploy to prod
        run: |
          kubectl apply -k k8s/overlays/prod --server-side

      - name: Generate GitHub App Installation Token
        id: generate-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Create Kubernetes secrets
        env:
          SENDR_DATABASE_URL: ${{ secrets.PROD_SENDR_DATABASE_URL }}
          SENDR_SECRET_KEY: ${{ secrets.PROD_SENDR_SECRET_KEY }}
          SENDR_SMTP_HOST: ${{ secrets.SENDR_SMTP_HOST }}
          SENDR_SMTP_PORT: ${{ secrets.SENDR_SMTP_PORT }}
          SENDR_SMTP_USER: ${{ secrets.SENDR_SMTP_USER }}
          SENDR_SMTP_PASSWORD: ${{ secrets.SENDR_SMTP_PASSWORD }}
          SENDR_RESEND_API_KEY: ${{ secrets.SENDR_RESEND_API_KEY }}
          GITHUB_APP_TOKEN: ${{ steps.generate-token.outputs.token }}
          SENDR_GITHUB_EMAIL: ${{ vars.SENDR_GITHUB_EMAIL }}
        run: ./scripts/create-secrets.sh ${{ env.ENVIRONMENT }}