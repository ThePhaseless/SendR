apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sendr-frontend
  namespace: sendr
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  ingressClassName: traefik
  rules:
    - host: sendr.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sendr-frontend
                port:
                  number: 80
    - host: www.sendr.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sendr-frontend
                port:
                  number: 80