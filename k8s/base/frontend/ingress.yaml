apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sendr-frontend
  namespace: sendr
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: sendr.email
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sendr-frontend
                port:
                  number: 80
    - host: www.sendr.email
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sendr-frontend
                port:
                  number: 80