apiVersion: apps/v1
kind: Deployment
metadata:
  name: sendr-frontend
  namespace: sendr
  labels:
    app: sendr-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sendr-frontend
  template:
    metadata:
      labels:
        app: sendr-frontend
    spec:
      serviceAccountName: sendr-app
      containers:
        - name: frontend
          image: ghcr.io/thephaseless/sendr/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: API_URL
              value: "http://sendr-backend.sendr.svc.cluster.local:8000"
            - name: CLIENT_MAX_BODY_SIZE
              value: "10g"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10