apiVersion: apps/v1
kind: Deployment
metadata:
  name: sendr-scan-worker
  namespace: sendr
  labels:
    app: sendr-scan-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sendr-scan-worker
  template:
    metadata:
      labels:
        app: sendr-scan-worker
    spec:
      serviceAccountName: sendr-app
      containers:
        - name: scan-worker
          image: ghcr.io/thephaseless/sendr/backend:latest
          imagePullPolicy: Always
          command:
            - python
            - src/scan_worker.py
          env:
            - name: SENDR_ENVIRONMENT
              valueFrom:
                secretKeyRef:
                  name: sendr-secrets
                  key: environment
            - name: SENDR_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sendr-secrets
                  key: database-url
            - name: SENDR_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: sendr-secrets
                  key: secret-key
            - name: SENDR_ALTCHA_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: sendr-secrets
                  key: altcha-hmac-key
            - name: SENDR_SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: sendr-secrets
                  key: smtp-host
            - name: SENDR_SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: sendr-secrets
                  key: smtp-port
            - name: SENDR_SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: sendr-secrets
                  key: smtp-user
            - name: SENDR_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sendr-secrets
                  key: smtp-password
            - name: SENDR_RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sendr-secrets
                  key: resend-api-key
            - name: SENDR_SPACES_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: sendr-secrets
                  key: spaces-access-key
            - name: SENDR_SPACES_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: sendr-secrets
                  key: spaces-secret-key
            - name: SENDR_SPACES_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: sendr-secrets
                  key: spaces-bucket-name
            - name: SENDR_SPACES_REGION
              valueFrom:
                secretKeyRef:
                  name: sendr-secrets
                  key: spaces-region
            - name: SENDR_VIRUS_SCANNING_ENABLED
              value: "true"
            - name: SENDR_CLAMAV_HOST
              value: sendr-clamav
            - name: SENDR_CLAMAV_PORT
              value: "3310"
            - name: SENDR_CLAMAV_UNIX_SOCKET
              value: ""
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi