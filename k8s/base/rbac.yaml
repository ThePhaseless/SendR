apiVersion: v1
kind: ServiceAccount
metadata:
  name: sendr-app
  namespace: sendr
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sendr-app-role
  namespace: sendr
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sendr-app-rolebinding
  namespace: sendr
subjects:
- kind: ServiceAccount
  name: sendr-app
  namespace: sendr
roleRef:
  kind: Role
  name: sendr-app-role
  apiGroup: rbac.authorization.k8s.io
