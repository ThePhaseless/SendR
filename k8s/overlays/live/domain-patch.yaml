---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sendr-backend
  namespace: sendr
spec:
  rules:
    - host: api.live.sendr.email
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sendr-backend
                port:
                  number: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sendr-frontend
  namespace: sendr
spec:
  rules:
    - host: live.sendr.email
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sendr-frontend
                port:
                  number: 80
