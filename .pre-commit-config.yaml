repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-check
        name: backend ruff check
        files: ^backend/.*\.py$
        pass_filenames: false
        args: [--fix, backend/]
      - id: ruff-format
        name: backend ruff format
        files: ^backend/.*\.py$
        pass_filenames: false
        args: [backend/]

  - repo: local
    hooks:
      - id: generate-openapi-client
        name: generate OpenAPI client
        language: system
        entry: bash ./scripts/generate-openapi-client.sh
        pass_filenames: false
        files: ^(backend/src/.*\.py|openapi\.json)$

      - id: frontend-build
        name: frontend build
        language: system
        entry: bash -c 'unset NODE_OPTIONS; cd frontend && bun run build'
        pass_filenames: false
        files: ^(frontend/.*|backend/src/.*\.py|openapi\.json)$

      - id: frontend-oxfmt
        name: frontend oxfmt
        language: system
        entry: bash -c 'unset NODE_OPTIONS; cd frontend && bun run format'
        pass_filenames: false
        files: ^frontend/src/.*\.(ts|tsx|js|jsx|mjs|cjs|json|css|scss|html)$
        exclude: ^frontend/src/app/api/

      - id: frontend-oxlint
        name: frontend oxlint
        language: system
        entry: bash -c 'unset NODE_OPTIONS; cd frontend && bun run lint:fix'
        pass_filenames: false
        files: ^frontend/src/.*\.(ts|tsx|js|jsx)$

      - id: backend-test
        name: backend pytest
        language: system
        entry: bash -c 'cd backend && uv run --no-project pytest'
        pass_filenames: false
        files: ^backend/.*\.py$
