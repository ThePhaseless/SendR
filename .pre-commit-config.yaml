repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-check
        name: backend ruff check
        files: ^backend/.*\.py$
      - id: ruff-format
        name: backend ruff format
        files: ^backend/.*\.py$
        args:
          - --check

  - repo: local
    hooks:
      - id: generate-openapi-client
        name: generate OpenAPI client
        language: system
        entry: bash ./scripts/generate-openapi-client.sh
        pass_filenames: false
        files: ^(backend/src/.*\.py|openapi\.json)$

      - id: frontend-build
        name: frontend build
        language: system
        entry: bash -lc 'cd frontend && bun run build'
        pass_filenames: false
        files: ^(frontend/.*|backend/src/.*\.py|openapi\.json)$

      - id: frontend-oxfmt
        name: frontend oxfmt
        language: system
        entry: bash ./scripts/run-frontend-oxfmt.sh
        files: ^frontend/src/.*\.(ts|tsx|js|jsx|mjs|cjs|json|css|scss|html)$
        exclude: ^frontend/src/app/api/

      - id: frontend-oxlint
        name: frontend oxlint
        language: system
        entry: bash ./scripts/run-frontend-oxlint.sh
        files: ^frontend/src/.*\.(ts|tsx|js|jsx)$
        exclude: ^frontend/src/app/api/
