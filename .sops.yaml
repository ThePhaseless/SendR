#
# To add a new team member:
#   1. Ask them to run: age-keygen -o ~/.config/sops/age/keys.txt
#   2. Have them send you their public key (the comment line)
#   3. Add it below, then run: find . -name "*.enc.*" -exec sops rotate -i {} \;
#   4. Commit and push
#
# To remove a team member:
#   1. Remove their public key from the list below
#   2. Run: find . -name "*.enc.*" -exec sops rotate -i {} \;
#   3. Commit and push
#   Old commits remain decryptable by them, but future secrets are safe.

