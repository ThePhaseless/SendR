services:
  api:
    build:
      context: ./backend
    volumes:
      - uploads:/app/uploads
      - data:/app/data
    ports:
      - "8000:8000"
    environment:
      SENDR_ENVIRONMENT: production
    # Additional environment variables — uncomment and customise as needed:
    # environment:
    #   SENDR_ENVIRONMENT: production
    #   SENDR_ALLOWED_ORIGINS: '["https://app.example.com"]'
    #   SENDR_DEV_MODE: false
    #   SENDR_SECRET_KEY: change-me-in-production
    #   SENDR_SMTP_HOST: localhost
    #   SENDR_SMTP_PORT: 587
    #   SENDR_SMTP_USER: ""
    #   SENDR_SMTP_PASSWORD: ""
    #   SENDR_SMTP_FROM: noreply@sendr.app
    #   SENDR_BASIC_MAX_FILE_SIZE_MB: 100
    #   SENDR_FREE_MAX_FILE_SIZE_MB: 1024
    #   SENDR_PREMIUM_MAX_FILE_SIZE_MB: 10240
    #   SENDR_FILE_EXPIRY_DAYS: 7
    #   SENDR_FILE_GRACE_PERIOD_DAYS: 7
    #   SENDR_TOKEN_EXPIRE_MINUTES: 1440
    #   SENDR_VERIFICATION_CODE_EXPIRE_MINUTES: 10
    #   SENDR_AUTH_RATE_LIMIT_PER_MINUTE: 5
    #   SENDR_ALTCHA_HMAC_KEY: ""
    #   SENDR_ALTCHA_MAX_NUMBER: 100000
    #   SENDR_ALTCHA_EXPIRE_MINUTES: 5

  frontend:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  uploads:
  data:
